name: Update Icon Checklist

on:
  push:
    paths:
      - "icons/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate checklist
        run: python scripts/check_icons.py > ICON_STATUS.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ICON_STATUS.md
          git commit -m "Update icon checklist" || exit 0
          git push